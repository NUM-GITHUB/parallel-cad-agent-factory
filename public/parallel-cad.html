<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parallel CAD Kernel Monitor</title>
    <link rel="stylesheet" href="/parallel-cad.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="Prompt and run controls">
        <div class="brand-row">
          <div class="mark">CAD</div>
          <div>
            <h1>Parallel CAD Kernel Monitor</h1>
            <p>Type one modeling task, split it into agent prompts, then watch every Kernel computer update from screenshots.</p>
          </div>
        </div>

        <label class="prompt-label" for="prompt">Task prompt</label>
        <textarea id="prompt" spellcheck="false">Make a cute desktop robot with a purple head, green body, orange arms, blue wheel feet, and a small chest screen.</textarea>

        <div class="button-row">
          <button id="runButton" class="primary-button" type="button">Start Kernels</button>
          <button id="stopButton" class="secondary-button" type="button" disabled>Stop</button>
          <button id="resetButton" class="secondary-button" type="button">Reset</button>
        </div>

        <dl class="metrics">
          <div>
            <dt>Run</dt>
            <dd id="runId">none</dd>
          </div>
          <div>
            <dt>Kernels</dt>
            <dd id="kernelCount">0</dd>
          </div>
          <div>
            <dt>Refresh</dt>
            <dd id="refreshRate">waiting</dd>
          </div>
        </dl>
      </section>

      <section class="planner-panel" aria-label="Planner output">
        <div class="section-heading">
          <h2>Planner Output</h2>
          <span id="plannerStatus" class="status idle">idle</span>
        </div>
        <ol id="planList" class="plan-list"></ol>
      </section>

      <section class="monitor-panel" aria-label="Kernel monitor">
        <div class="section-heading">
          <h2>Kernel Monitor</h2>
          <span id="monitorStatus" class="status idle">idle</span>
        </div>
        <div id="monitorGrid" class="monitor-grid" aria-live="polite"></div>
      </section>

      <section class="manifest-panel" aria-label="Run manifest">
        <div class="section-heading">
          <h2>Run Manifest</h2>
          <span id="manifestStatus" class="status idle">idle</span>
        </div>
        <pre id="manifest">{}</pre>
      </section>
    </main>
    <script src="/parallel-cad.js"></script>
  </body>
</html>
